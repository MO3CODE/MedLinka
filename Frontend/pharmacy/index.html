<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLinka Pharmacy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0a7c6e; --teal-light: #12a090; --teal-dark: #0a4d45;
  --teal-bg: #e8f8f6; --bg: #f0f4f8; --sidebar-bg: #0d1f1c;
  --text: #1a2e35; --muted: #8a9ab0; --border: #e0e8f0;
  --white: #fff; --danger: #e53e3e; --success: #1a8a5a; --warn: #d97706;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar { width:260px; background:var(--sidebar-bg); flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
.sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-brand h1 { font-size:20px; font-weight:800; color:#fff; }
.sidebar-brand span { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; }
.sidebar-nav { padding:16px 12px; flex:1; }
.nav-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; cursor:pointer; transition:all 0.2s; color:rgba(255,255,255,0.55); font-size:14px; font-weight:600; margin-bottom:4px; border:none; background:none; width:100%; text-align:right; }
.nav-item:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85); }
.nav-item.active { background:rgba(18,160,144,0.2); color:#4ee5d4; }
.nav-item .icon { font-size:20px; width:24px; text-align:center; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 28px; height:64px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding:24px 28px; }

.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:#fff; border-radius:16px; padding:20px; border:1px solid var(--border); }
.stat-label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.stat-value { font-size:28px; font-weight:800; color:var(--text); }
.stat-icon { font-size:28px; float:left; opacity:0.6; }

.table-wrap { background:#fff; border-radius:16px; border:1px solid var(--border); overflow:hidden; margin-bottom:28px; }
table { width:100%; border-collapse:collapse; }
th { background:#f8fafb; padding:14px 16px; text-align:right; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
td { padding:14px 16px; font-size:13px; border-bottom:1px solid #f5f7fa; vertical-align:middle; }
tr:hover td { background:#fafcfd; }

.badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-success { background:#d4f5e9; color:#1a8a5a; }
.badge-warn { background:#fef3cd; color:#b87a00; }
.badge-danger { background:#fde8e8; color:#c53030; }
.badge-info { background:#e3f2fd; color:#1565c0; }

.order-card { background:#fff; border-radius:12px; padding:16px; border:1px solid var(--border); margin-bottom:12px; }
.order-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.order-customer { font-weight:700; font-size:15px; }
.order-time { font-size:13px; color:var(--teal); font-weight:600; }

.btn { padding:8px 16px; border-radius:8px; border:none; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; }
.btn-primary { background:var(--teal); color:#fff; }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--teal); color:var(--teal); }

.loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>🏥 MedLinka</h1>
    <span>لوحة تحكم الصيدلية</span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="showPanel('dashboard')"><span class="icon">📊</span> لوحة التحكم</button>
    <button class="nav-item" onclick="showPanel('orders')"><span class="icon">🛒</span> الطلبات الواردة</button>
    <button class="nav-item" onclick="showPanel('medicines')"><span class="icon">💊</span> ادارة الادوية</button>
    <button class="nav-item" onclick="showPanel('stock')"><span class="icon">📦</span> المخزون</button>
    <button class="nav-item" onclick="showPanel('prescriptions')"><span class="icon">📋</span> الوصفات الطبية</button>
    <button class="nav-item" onclick="showPanel('deliveries')"><span class="icon">🚚</span> الشحنات</button>
    <button class="nav-item" onclick="showPanel('profile')"><span class="icon">⚙️</span> الاعدادات</button>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-right">
      <span class="admin-badge">💊 الصيدلية المركزية</span>
      <button class="refresh-btn" onclick="loadAll()">↻ تحديث</button>
      <button class="refresh-btn" onclick="logout()" style="background:var(--danger)">خروج</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-label">الطلبات الجديدة</div><div class="stat-value">7</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">مكتملة اليوم</div><div class="stat-value">12</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">المبيعات</div><div class="stat-value">895 ر.س</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label">عناصر المخزون</div><div class="stat-value">142</div></div>
    </div>

    <h3 style="margin-bottom:16px">✅ الطلبات الجديدة التي تحتاج معالجة</h3>
    
    <div id="ordersContainer">
      <div class="loading">⏳ جاري تحميل الطلبات...</div>
    </div>

  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('ml_token');
let orders = [];

async function req(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function showPanel(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

async function loadOrders() {
  const data = await req('GET', '/pharmacy/orders');
  if (data.orders) {
    orders = data.orders;
    renderOrders();
    updateStats();
  }
}

function renderOrders() {
  const container = document.getElementById('ordersContainer');
  if (!container) return;
  
  const pending = orders.filter(o => o.status === 'pending');
  
  if (pending.length === 0) {
    container.innerHTML = '<div class="loading">✅ لا يوجد طلبات جديدة حالياً</div>';
    return;
  }
  
  container.innerHTML = pending.map(order => `
    <div class="order-card">
      <div class="order-header">
        <div class="order-customer">👤 ${order.customerName || 'عميل غير معروف'}</div>
        <div class="order-time">⏰ قبل ${Math.floor((Date.now() - new Date(order.createdAt)) / 60000)} دقائق</div>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:12px">
        🛒 ${order.items?.length || 0} عناصر • المجموع: ${order.total || 0} ر.س • موقع التسليم: ${order.address || 'غير محدد'}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-success" onclick="acceptOrder('${order._id}')">✅ قبول الطلب</button>
        <button class="btn btn-outline" onclick="viewOrderDetails('${order._id}')">📋 تفاصيل الطلب</button>
        <button class="btn btn-danger" onclick="rejectOrder('${order._id}')">❌ رفض</button>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const pending = orders.filter(o => o.status === 'pending').length;
  const completed = orders.filter(o => o.status === 'delivered').length;
  const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
  
  document.querySelector('.stats-grid div:nth-child(1) .stat-value').textContent = pending;
  document.querySelector('.stats-grid div:nth-child(2) .stat-value').textContent = completed;
  document.querySelector('.stats-grid div:nth-child(3) .stat-value').textContent = totalRevenue + ' ر.س';
}

async function acceptOrder(id) {
  await req('PATCH', `/pharmacy/orders/${id}/accept`);
  showToast('✅ تم قبول الطلب بنجاح');
  loadOrders();
}

async function rejectOrder(id) {
  await req('PATCH', `/pharmacy/orders/${id}/reject`);
  showToast('❌ تم رفض الطلب');
  loadOrders();
}

function viewOrderDetails(id) {
  const order = orders.find(o => o._id === id);
  if (!order) return;
  
  alert(`📋 تفاصيل الطلب:\n\nالعميل: ${order.customerName}\nالعنوان: ${order.address}\nعدد العناصر: ${order.items?.length}\nالمجموع: ${order.total} ر.س`);
}

function loadAll() {
  loadOrders();
  showToast('🔄 تم تحديث البيانات');
}

function logout() {
  localStorage.removeItem('ml_token');
  localStorage.removeItem('ml_user');
  window.location.href = '/';
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a8a5a;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;animation:slideIn 0.3s ease';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// التحقق من صلاحيات الدخول وتحميل البيانات
(async () => {
  const user = JSON.parse(localStorage.getItem('ml_user') || '{}');
  if (!user || user.role !== 'pharmacy') {
    window.location.href = '/';
    return;
  }
  
  await loadOrders();
  
  // تحديث تلقائي كل 30 ثانية
  setInterval(loadOrders, 30000);
})();
</script>

</body>
</html>
